<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" fill="#0F172A"/>
  <!-- Heart rate line -->
  <polyline points="40,120 70,110 90,130 110,80 130,120 150,70 170,110 190,60" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Plus sign -->
  <text x="220" y="90" font-family="Inter, sans-serif" font-weight="800" font-size="24" fill="#10B981" opacity="0.6">+</text>
  <!-- Stethoscope -->
  <circle cx="280" cy="90" r="20" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="280" cy="90" r="6" fill="#10B981" opacity="0.2"/>
  <line x1="280" y1="110" x2="280" y2="140" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="140" x2="260" y2="150" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="140" x2="300" y2="150" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <!-- Text label -->
  <text x="200" y="180" font-family="Inter, sans-serif" font-weight="600" font-size="9" fill="#64748B" text-anchor="middle">NCD PREDICT — HEALTH AI</text>
</svg>
