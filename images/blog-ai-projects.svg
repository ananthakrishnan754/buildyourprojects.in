<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="180" fill="url(#glow)"/>
  <circle cx="600" cy="350" r="140" fill="url(#glow)"/>
  
  <!-- Neural network nodes -->
  <g stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.3">
    <line x1="400" y1="100" x2="300" y2="180"/>
    <line x1="400" y1="100" x2="400" y2="200"/>
    <line x1="400" y1="100" x2="500" y2="180"/>
    <line x1="300" y1="180" x2="250" y2="280"/>
    <line x1="300" y1="180" x2="370" y2="290"/>
    <line x1="400" y1="200" x2="370" y2="290"/>
    <line x1="400" y1="200" x2="430" y2="290"/>
    <line x1="500" y1="180" x2="430" y2="290"/>
    <line x1="500" y1="180" x2="550" y2="280"/>
    <line x1="250" y1="280" x2="200" y2="360"/>
    <line x1="250" y1="280" x2="300" y2="370"/>
    <line x1="370" y1="290" x2="350" y2="380"/>
    <line x1="430" y1="290" x2="450" y2="380"/>
    <line x1="550" y1="280" x2="600" y2="360"/>
    <line x1="550" y1="280" x2="500" y2="370"/>
  </g>
  
  <!-- Nodes -->
  <g fill="#3B82F6">
    <circle cx="400" cy="100" r="8" opacity="0.9"/>
    <circle cx="300" cy="180" r="6" opacity="0.7"/>
    <circle cx="400" cy="200" r="6" opacity="0.7"/>
    <circle cx="500" cy="180" r="6" opacity="0.7"/>
    <circle cx="250" cy="280" r="5" opacity="0.6"/>
    <circle cx="370" cy="290" r="5" opacity="0.6"/>
    <circle cx="430" cy="290" r="5" opacity="0.6"/>
    <circle cx="550" cy="280" r="5" opacity="0.6"/>
    <circle cx="200" cy="360" r="4" opacity="0.4"/>
    <circle cx="300" cy="370" r="4" opacity="0.4"/>
    <circle cx="350" cy="380" r="4" opacity="0.4"/>
    <circle cx="450" cy="380" r="4" opacity="0.4"/>
    <circle cx="500" cy="370" r="4" opacity="0.4"/>
    <circle cx="600" cy="360" r="4" opacity="0.4"/>
  </g>

  <!-- Robot icon -->
  <g transform="translate(560, 60)">
    <rect x="0" y="20" width="70" height="55" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <rect x="15" y="5" width="40" height="25" rx="5" fill="#1E293B" stroke="#60A5FA" stroke-width="1.5"/>
    <circle cx="28" cy="18" r="4" fill="#60A5FA"/>
    <circle cx="42" cy="18" r="4" fill="#60A5FA"/>
    <rect x="20" y="38" width="8" height="6" rx="2" fill="#3B82F6"/>
    <rect x="42" y="38" width="8" height="6" rx="2" fill="#3B82F6"/>
  </g>

  <!-- Text -->
  <text x="400" y="340" font-family="Outfit, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Top 5 AI Projects</text>
  <text x="400" y="384" font-family="Outfit, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">for Final Year Engineering</text>
  <text x="400" y="420" font-family="DM Sans, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">Build to impress in 2026</text>
</svg>
