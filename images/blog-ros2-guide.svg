<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" fill="#0F172A"/>
  <!-- Robot body -->
  <rect x="140" y="70" width="120" height="60" rx="10" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="155" y="80" width="90" height="14" rx="3" fill="#7C3AED" opacity="0.25"/>
  <text x="200" y="91" font-family="Inter, sans-serif" font-weight="700" font-size="9" fill="#A78BFA" text-anchor="middle">ROS 2</text>
  <rect x="155" y="100" width="70" height="4" rx="1" fill="#7C3AED" opacity="0.15"/>
  <rect x="155" y="108" width="80" height="4" rx="1" fill="#7C3AED" opacity="0.15"/>
  <rect x="155" y="116" width="60" height="4" rx="1" fill="#7C3AED" opacity="0.15"/>
  <!-- Network nodes -->
  <circle cx="80" cy="100" r="18" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="80" cy="100" r="6" fill="#2563EB" opacity="0.3"/>
  <circle cx="320" cy="100" r="18" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="320" cy="100" r="6" fill="#10B981" opacity="0.3"/>
  <!-- Connections -->
  <line x1="98" y1="100" x2="140" y2="100" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="260" y1="100" x2="302" y2="100" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Topic label -->
  <text x="200" y="48" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#A78BFA" text-anchor="middle">/cmd_vel</text>
  <line x1="200" y1="55" x2="200" y2="70" stroke="#A78BFA" stroke-width="1" opacity="0.5"/>
  <!-- Wheels -->
  <rect x="145" y="130" width="20" height="10" rx="5" fill="#7C3AED" opacity="0.3"/>
  <rect x="235" y="130" width="20" height="10" rx="5" fill="#7C3AED" opacity="0.3"/>
  <!-- Sensor node -->
  <circle cx="200" cy="44" r="8" fill="#A78BFA" opacity="0.1" stroke="#A78BFA" stroke-width="1"/>
  <circle cx="200" cy="44" r="3" fill="#A78BFA" opacity="0.3"/>
  <text x="200" y="170" font-family="Inter, sans-serif" font-weight="600" font-size="9" fill="#64748B" text-anchor="middle">ROS 2 ROBOTICS</text>
</svg>
